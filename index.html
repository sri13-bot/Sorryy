<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    text-align:center;
    color:#333;
}

.container{
    padding:40px 20px;
}

h1{
    color:white;
    font-size:40px;
}

.message{
    background:white;
    max-width:500px;
    margin:auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.gallery{
    margin-top:30px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.gallery img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
    transition:transform 0.3s;
}

.gallery img:hover{
    transform:scale(1.1);
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63950;
}

.heart{
    position:fixed;
    color:red;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1}
    100%{transform:translateY(-600px);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>I'm Sorry ❤️</h1>

<div class="message">

<p>
Hey my love,<br><br>

I know I made a mistake and I'm really sorry.  
You are one of the most important people in my life and I never want to hurt you.

Every moment with you means everything to me.  
Please forgive me. 🥺💖

</p>

<button onclick="forgive()">Forgive Me?</button>

</div>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

</div>

<script>

function forgive(){
    alert("Thank you for forgiving me ❤️ I love you!");
}

function hearts(){
    const heart=document.createElement("div");
    heart.innerHTML="❤️";
    heart.className="heart";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(hearts,400);

</script>

</body>
</html>
